commands:
  install: pnpm install
  typecheck: tsc --noEmit
  build: pnpm run build
  test: pnpm test
  lint: eslint .
  dev: pnpm run dev
  db:generate: pnpm prisma generate
  db:migrate: pnpm prisma migrate dev
  db:push: pnpm prisma db push
  db:studio: pnpm prisma studio
  db:seed: pnpm prisma db seed
  db:pull: pnpm prisma db pull

services:
  web:
    start: pnpm run dev
    stop: lsof -ti :3000 | xargs kill -9 2>/dev/null || true
    healthcheck: curl -sf http://localhost:3000
    port: 3000
    depends_on: []

  postgres:
    # External PostgreSQL - not started by us
    # Connection via DATABASE_URL env var
    healthcheck: pg_isready -h 103.150.81.71 -p 6647 -d halal-nova -U postgres
    port: 6647
    depends_on: []
