# Service definitions for Halal Form mission
services:
  web:
    description: TanStack Start development server
    start: pnpm dev
    stop: pkill -f "vite dev" || true
    healthcheck:
      type: http
      url: http://localhost:3002
      expected_status: 200
    env:
      - DATABASE_URL
      - SESSION_SECRET
    port: 3002

dependencies:
  web: []
